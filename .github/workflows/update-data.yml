name: Update data.json from spreadsheet

on:
  schedule:
    # 毎時 0 分・30 分（UTC・JST 関係なく 30 分間隔で動く）
    - cron: "0,30 * * * *"
  workflow_dispatch:  # GitHub の Actions タブから誰でも手動起動可能

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Build data.json
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
          SHEET_ID: 1KgdXxw5Wci1Gu0GqBviT5E5uwl9taA7jDbv49C60ckw
        run: python scripts/build_data.py

      - name: Commit if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain data.json)" ]]; then
            git add data.json
            git commit -m "Auto-update data.json [skip ci]"
            git push
            echo "✅ data.json updated"
          else
            echo "✅ No changes detected"
          fi
